name: proyek
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  fruit_cutting_game:
    path: modules/Fruit-Cutting-Game
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  firebase_core: ^4.4.0
  http: ^1.6.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: KasteloVultra
      fonts:
        - asset: assets/fonts/kastelovultra.otf
          weight: 700
